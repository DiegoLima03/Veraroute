<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0;display:flex;height:100vh;overflow:hidden}
#sidebar{width:400px;min-width:400px;display:flex;flex-direction:column;background:#16213e;border-right:1px solid #0f3460}
#map-container{flex:1;position:relative}
#map{height:100%;width:100%}
.header{padding:14px 18px;background:#0f3460;border-bottom:1px solid #1a3a6a}
.header h1{font-size:18px;color:#e94560;margin-bottom:6px}
.stats{display:flex;gap:12px;font-size:12px;color:#8899aa}
.stats span{background:#1a2744;padding:3px 8px;border-radius:4px}
.stats .num{color:#e94560;font-weight:700}
.filters{padding:10px 18px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid #0f3460}
.filters input{flex:1;min-width:140px;padding:7px 12px;border-radius:6px;border:1px solid #0f3460;background:#1a2744;color:#e0e0e0;font-size:13px;outline:none}
.filters input:focus{border-color:#e94560}
.filters select{padding:7px 8px;border-radius:6px;border:1px solid #0f3460;background:#1a2744;color:#e0e0e0;font-size:12px;outline:none;cursor:pointer}
#client-list{flex:1;overflow-y:auto;padding:6px}
#client-list::-webkit-scrollbar{width:6px}
#client-list::-webkit-scrollbar-thumb{background:#0f3460;border-radius:3px}
.client-card{padding:10px 14px;margin:4px 0;border-radius:8px;background:#1a2744;border-left:4px solid #27ae60;cursor:pointer;transition:.15s}
.client-card:hover{background:#1e3050}
.client-card.highlighted{background:#2a3f60;box-shadow:0 0 0 1px #e94560}
.client-name{font-weight:600;font-size:13px;color:#fff;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.badge-ruta{color:#fff}
.client-addr{font-size:11px;color:#8899aa;margin-bottom:2px}
.client-contact{font-size:11px;color:#7788aa}
.footer{padding:10px 18px;background:#0f3460;border-top:1px solid #1a3a6a;font-size:11px;color:#667;text-align:center}
.legend{position:absolute;bottom:30px;right:10px;background:rgba(255,255,255,.92);padding:12px 16px;border-radius:8px;z-index:999;font-size:12px;color:#333;border:1px solid #ccc;font-family:'Segoe UI',system-ui,sans-serif}
.legend-title{font-weight:700;margin-bottom:6px;color:#222;font-size:13px}
.legend-item{display:flex;align-items:center;gap:8px;margin:4px 0}
.legend-dot{width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 2px rgba(0,0,0,.3)}
.leaflet-popup-content-wrapper{background:#fff;color:#333;border-radius:8px}
.leaflet-popup-tip{background:#fff}
.leaflet-popup-content{font-size:13px;line-height:1.6}
.popup-name{font-weight:700;color:#e94560;font-size:14px}
.popup-ruta{display:inline-block;color:#fff;padding:1px 8px;border-radius:10px;font-size:11px;margin-top:4px}
</style>
</head>

const RUTAS = [{"id":1,"name":"Pontevedra 3"},{"id":2,"name":"Comarca A"},{"id":3,"name":"Comarca B"},{"id":4,"name":"Pontevedra 1"},{"id":5,"name":"Pontevedra 2"},{"id":6,"name":"Orense A"},{"id":7,"name":"Orense B"},{"id":8,"name":"Orense C"}];
const RUTA_COLORS = ['#795548','#3498db','#2ecc71','#9b59b6','#e67e22','#1abc9c','#e84393','#d4b800','#6c5ce7','#d4a830'];

let searchQ = '';
let rutaFilter = '';
let markers = [];
let markerMap = {};

const map = L.map('map').setView([42.3, -8.2], 8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://osm.org/copyright">OSM</a>',
  maxZoom: 19, subdomains: 'abcd'
}).addTo(map);

const sel = document.getElementById('filterRuta');
RUTAS.forEach(r => { const o = document.createElement('option'); o.value = r.id; o.textContent = r.name; sel.appendChild(o); });
sel.addEventListener('change', () => { rutaFilter = sel.value; render(); });
document.getElementById('search').addEventListener('input', e => { searchQ = e.target.value.toLowerCase(); render(); });

function getRutaColor(ri) {
  const idx = RUTAS.findIndex(r => r.id == ri);
  return idx >= 0 ? RUTA_COLORS[idx % RUTA_COLORS.length] : '#27ae60';
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function getFiltered() {
  return DATA.filter(c => {
    if (rutaFilter && c.ri != rutaFilter) return false;
    if (searchQ && !(c.n + ' ' + c.a + ' ' + c.p + ' ' + c.no).toLowerCase().includes(searchQ)) return false;
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  document.getElementById('statTotal').textContent = DATA.length;
  document.getElementById('statShowing').textContent = filtered.length;

  const list = document.getElementById('client-list');
  list.innerHTML = filtered.map(c => {
    const color = c.ri ? getRutaColor(c.ri) : '#27ae60';
    let badges = '';
    if (c.rn) badges += '<span class="badge badge-ruta" style="background:' + color + '">' + esc(c.rn) + '</span>';
    const contact = [c.p, c.no].filter(Boolean).join(' | ');
    return '<div class="client-card" style="border-left-color:' + color + '" data-id="' + c.id + '" onclick="focusClient(' + c.id + ')">' +
      '<div class="client-name"><span>' + esc(c.n) + '</span><span>' + badges + '</span></div>' +
      (c.a ? '<div class="client-addr">' + esc(c.a) + '</div>' : '') +
      (contact ? '<div class="client-contact">' + esc(contact) + '</div>' : '') +
      '</div>';
  }).join('');

  markers.forEach(m => map.removeLayer(m));
  markers = [];
  markerMap = {};

  filtered.forEach(c => {
    const color = c.ri ? getRutaColor(c.ri) : '#27ae60';
    const icon = L.divIcon({
      className: '',
      html: '<div style="background:' + color + ';width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>',
      iconSize: [12, 12], iconAnchor: [6, 6]
    });
    const m = L.marker([c.x, c.y], { icon }).addTo(map);
    m.bindPopup(
      '<div class="popup-name">' + esc(c.n) + '</div>' +
      (c.a ? '<div>' + esc(c.a) + '</div>' : '') +
      (c.p ? '<div>Tel: ' + esc(c.p) + '</div>' : '') +
      (c.rn ? '<div class="popup-ruta" style="background:' + color + '">' + esc(c.rn) + '</div>' : '')
    );
    markers.push(m);
    markerMap[c.id] = m;
  });

  if (filtered.length) map.fitBounds(L.latLngBounds(filtered.map(c => [c.x, c.y])), { padding: [30, 30] });

  const usedRutas = [...new Set(filtered.filter(c => c.ri).map(c => c.ri))];
  const sinRuta = filtered.some(c => !c.ri);
  let leg = '<div class="legend-title">Rutas</div>';
  usedRutas.forEach(rid => {
    const r = RUTAS.find(x => x.id == rid);
    if (r) leg += '<div class="legend-item"><div class="legend-dot" style="background:' + getRutaColor(rid) + '"></div>' + esc(r.name) + '</div>';
  });
  if (sinRuta) leg += '<div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div>Sin ruta</div>';
  document.getElementById('legend').innerHTML = leg;
}

function focusClient(id) {
  document.querySelectorAll('.client-card').forEach(el => el.classList.remove('highlighted'));
  const card = document.querySelector('[data-id="' + id + '"]');
  if (card) { card.classList.add('highlighted'); card.scrollIntoView({ block: 'nearest' }); }
  const m = markerMap[id];
  if (m) { map.setView(m.getLatLng(), 14); m.openPopup(); }
}

render();
</script>
</body>
</html>
